<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Bridgr</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .signup-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 8px;
        }
        .logo span { color: #ffd700; }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
            font-size: 13px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn-signup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .btn-signup:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }
        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #64748b;
            font-size: 14px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .role-hint {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="logo">Bridgr<span>⚡</span></div>
        <div class="subtitle">Join your company's internal talent network</div>

        <form id="signupForm">
            <div class="form-row">
                <div class="form-group">
                    <label>First name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Last name</label>
                    <input type="text" id="lastName" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>

            <div class="form-group">
                <label>Office location</label>
                <select id="office" required>
                    <option value="">Select your office</option>
                    <option value="Munich">Munich</option>
                    <option value="Hamburg">Hamburg</option>
                    <option value="Berlin">Berlin</option>
                    <option value="Cologne">Cologne</option>
                    <option value="Frankfurt">Frankfurt</option>
                </select>
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" id="department" placeholder="e.g., Marketing, Engineering, Sales">
            </div>

            <div class="form-group">
                <label>Your role</label>
                <select id="role" required>
                    <option value="employee">👥 Coworker — I help on projects and post requests</option>
                    <option value="manager">👔 Manager — I approve team requests and monitor activity</option>
                </select>
            </div>

            <div class="form-group">
                <label>Skills (comma separated)</label>
                <input type="text" id="skills" placeholder="e.g., Python, Project Management, Data Analysis">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-signup">Create Account →</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                campus: document.getElementById('office').value,
                department: document.getElementById('department').value,
                role: document.getElementById('role').value,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()),
                bio: '',
                password: document.getElementById('password').value
            };
            
            localStorage.setItem('bridgr_user', JSON.stringify(userData));
            localStorage.setItem('bridgr_skills', JSON.stringify(userData.skills));
            localStorage.setItem('bridgr_office', userData.campus);
            localStorage.setItem('bridgr_department', userData.department);
            localStorage.setItem('bridgr_role', userData.role);
            
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
